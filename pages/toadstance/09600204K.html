            <header>
                <h1>狀元、榜眼、探花、傳臚</h1>
            </header>

            <hr>

            <p>
                狀元：殿試，一甲第一名。<br>
                榜眼：殿試，一甲第二名。<br>
                探花：殿試，一甲第三名。<br>
                傳臚：殿試，二甲第一名。<br>
                <br>
                狀元、榜眼、探花都是社會稱呼，官方只以一甲第一名等公布，畢竟都是科舉考試中的進士，實際上地位一樣，不分名次。當然也沒有所謂狀元即駙馬的慣例，歷史上唐朝的僅鄭顥是一甲第一名且駙馬。<br>
                <br>
                會試以第一名中貢士者則稱會元，鄉試以第一名中舉人者則稱解元。得解元、會元、狀元者，稱三元及第；其中宋朝「馮京」以及清朝「錢棨」，更是連中三元！宋朝「宋庠」則是取代弟弟的狀元資格，也連中三元。<br>
                <br>
                得到入學考試資格的人，則稱秀才，是最基礎的士大夫，即地方上有聲望的知識分子。
            </p>

        </article>
