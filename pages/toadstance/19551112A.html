        <article>

            <header>
                <h1>吃東西經常咬到嘴唇</h1>
            </header>

            <hr>

            <p>
                我吃東西經常咬到嘴唇，每次一咬破就很懊惱，因為又要經歷半個月嘴破一個大洞的痛。<br>
                <br>
                一年大概會咬到四五次吧，很納悶為何總是如此？每次咬破嘴唇就上網找資料，也解決不了問題。<br>
                <br>
                有天發現每次咬到嘴唇的共通點：「轉頭。」吃早餐時忽然有人叫我，一轉頭，結果咬到嘴唇。吃冰棒時抬頭看一下左手邊發出怪聲的冷氣機，一轉頭，咬到嘴唇。只要吃東西時有轉頭的動作，就很容易咬到嘴唇。<br>
                <br>
                自從發現這點，我就督促自己，吃東西千萬不要轉頭，吃東西永遠望著前方，因為不想再經歷看著嘴唇的洞越破越大的痛了。好像真的是這個原因，我已經超過一年不曾咬破嘴唇了～
            </p>

        </article>
