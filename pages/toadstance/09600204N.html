            <header>
                <h1>風林火山</h1>
            </header>

            <hr>

            <p>
                出自《孫子兵法》：「其疾如風、其徐如林、侵掠如火、不動如山。」<br>
                <br>
                進軍時如風迅速，退兵時如森林肅穆；發動攻勢時如火猛烈一發不可收拾，抵禦時如山穩固不可動搖。<br>
                <br>
                也就是說「風林火山」所表達的是「進退」與「攻守」的道理。<br>
                <br>
                其中「風」助長「火」，「林」構造「山」，進一步了解「風林火山」四個字相互影響的關係，更能掌握進退攻守的原則。
            </p>

        </article>
