<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>

        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>

    <body>

        <article>

            <header>
                <h1>五術</h1>
                <p>山、醫、命、卜、相。（江湖術士五大技能）</p>
            </header>

            <hr>

            <section>
                <h2>山</h2>
                <p>
                    神仙方術；靈修、養生。
                </p>
            </section>

            <hr>

            <section>
                <h2>醫</h2>
                <p>
                    漢醫；鍼灸、方劑、靈治。
                </p>
            </section>

            <hr>

            <section>
                <h2>命</h2>
                <p>
                    中國占星學；紫微斗數、子平八字。
                </p>
            </section>

            <hr>

            <section>
                <h2>卜</h2>
                <p>
                    算命；占卜（斷易、六壬神課）、選吉（奇門遁甲）、測局（太乙神數）。
                </p>
            </section>

            <hr>

            <section>
                <h2>相</h2>
                <p>
                    相術（風水）：印相、名相、人相、宅相、墓相。
                </p>
            </section>

        </article>

    </body>
