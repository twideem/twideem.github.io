    <body>

        <article>

            <header>
                <h1>大學與中庸</h1>
            </header>

            <hr>

            <section>
                <h2>大學</h2>
                <p>
                    中學時期的青少年，處於正在建立是非價值觀的年齡，且因為人生的經歷限於自我、尚未與社會百態混雜，所以常常以自我的觀感來衡量是非價值，導致不時與社會道德衝擊。<br>
                    <br>
                    對這樣階段的青少年，《大學》能夠讓他在懵懂的人生獲得指引，所以稱為「大人之學」，從青少年成長為懂得人生該擔負起那些社會責任的大人。
                </p>
            </section>

            <hr>

            <section>
                <h2>中庸</h2>
                <p>
                    中庸是一種處事態度。<br>
                    <br>
                    首先，世間上沒有任何決定是絕對完善的，只有相對完善。所謂中庸，便是站在客觀的立場，廣納各家意見，研擬出相對完善的決議，做為共識，而不偏執任何一家的所謂絕對完善意見，因為這種意見與其他意見不相容，是會受到阻力妨礙發展的做法。
                </p>
            </section>
        </article>
