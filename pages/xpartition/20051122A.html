		<article>

			<h1>Xbox 360 的 LB RB LT RT 鈕</h1>

			<hr>

			<p>
				老實說，每當遊戲提示按 LB 時，我都按錯成 LT！<br>
				<br>
				B 跟 T 讓我覺得是 BOTTOM 和 TOP 的意思，所以 LB 對我來說是「左下」，LT 則是「左上」～<br>
				<br>
				為了說服自己 LB 是左上那顆按鈕，查了一下，結果…<br>
				<br>
				<samp>
					LB = Left Bumper（左護欄；左槓）<br>
					RB = Right Bumper（右護欄；右槓）<br>
					LT = Left Trigger（左扳機）<br>
					RT = Right Trigger（右扳機）<br>
				</samp>
				<br>
				終於不會再按錯了～
			</p>

		</article>

	</body>
