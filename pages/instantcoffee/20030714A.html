<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<title>TWIDEEM CIVS</title>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<script src='../../scripts/template.js'></script>
		<script src='../../objects/plugins/sh.js'></script>
		<script>sh.lang('Java')</script>
	</head>

	<body>

		<article>

			<header>
				<h1>使用暫存檔輸出入資料</h1>
			</header>

			<hr>

			<p>
				<textarea class='brush:java'>
					import java.io.File;
					import java.io.BufferedReader;
					import java.io.FileReader;
					import java.io.FileWriter;

					public class Main{

						public static void main(String[] args){
							try{
								//建立暫存檔案（以 smpale 開頭，副檔名為 tmp，檔案放在執行檔位置。）
								File file = File.createTempFile("sample", ".tmp", new File("."));
								//將資料寫入暫存檔案
								FileWriter fire_writer = new FileWriter(file);
								fire_writer.write("Hello");
								fire_writer.close();
								//從暫存檔案輸出資料
								BufferedReader buffered_reader = new BufferedReader(new FileReader(file));
								System.out.println(buffered_reader.readLine());
								buffered_reader.close();
								//刪除暫存檔案
								file.deleteOnExit();
							}
							catch(Exception exception){
								exception.printStackTrace();
							}
						}

					}
                    </textarea>
				<br>
				程式執行過程，會在啟動程式的資料夾位置，建立名為 sample1471091860577354462.tmp 之類的檔案，然後輸出如下結果後，刪除檔案。<br>
				<br>
				<output>
					Hello
				</output>
			</p>

		</article>

	</body>

</html>
