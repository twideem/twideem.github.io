	<body>

		<article>

			<header>
				<h1>軟體工程的哲學：確保 1 + 1 = 2</h1>
			</header>

			<hr>

			<p>
				有些企業界老闆，說自己的管理哲學是：1 + 1 要大於 2。<br>
				<br>
				軟體工程的管理哲學則相反，必須確保 1 + 1 = 2。<br>
				<br>
				因為，開發軟體時最主要的問題，就是 1 + 1 經常大於 2。<br>
				<br>
				而許多開發手法，是用 1 + 1 小於 2 的方式，迴避 1 + 1 大於 2 的問題，於是導致更多的問題～
			</p>

		</article>

	</body>

</html>
