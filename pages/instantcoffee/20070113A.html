<!DOCTYPE html>

<html lang='zh-TW'>

        <meta charset='UTF-8'>

    <body>

        <article>

            <header>
                <h1>Splash（啟動畫面）</h1>
            </header>

            <hr>

            <p>
                在 java.exe 使用「-splash:圖檔位置」參數，即可將圖檔做為程式的啟動畫面。<br>
                <br>
                JAR 的話，在 MANIFEST.MF 裡面使用「SplashScreen-Image:圖檔位置」的格式來完成，且圖檔要在 JAR 裡面。
            </p>

        </article>

    </body>

</html>
