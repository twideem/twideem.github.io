	<body>

		<article>

			<header>
				<h1>static</h1>
				<p>用來宣告靜態的變數與函式。</p>
			</header>

			<hr>

			<section>
				<h2>什麼是靜態與動態？</h2>
				<p>
					應用軟體執行時，先不載入某些還沒用到的程式，等需要用到時再載入來執行，這就叫動態。動態載入的程式自然可以在應用軟體執行期間移除。<br>
					<br>
					相對的，應用軟體執行的同時就載入的程式，直到軟體關閉才結束，就是「靜態」了。<br>
					<br>
					「動態」使用 new 將類別建立為物件，「靜態」使用 static 來宣告後，不需要使用 new 就會隨著應用軟體的執行而建立。
				</p>
			</section>

			<hr>

			<footer>
				<p>[*] 換句話說，static 的靜態變數與函式，就是非動態產生的屬性與方法。</p>
			</footer>

		</article>

	</body>

</html>
