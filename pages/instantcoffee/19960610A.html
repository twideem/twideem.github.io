<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>javap 與反組譯</h1>
                <p>JDK 提供的反組譯工具，還原程式碼的能力不強，主要用來進行逆向工程追蹤位元碼的動作方式。</p>
            </header>

            <hr>

            <section>
                <h2>還原原始碼</h2>
                <p>
                    <code>javap -p 類別名稱 &gt; 類別名稱.txt</code><br>
                    <br>
                    將會在螢幕顯示類別的原始碼概況，並輸出到「類別名稱.txt」。
                </p>
            </section>

            <hr>

            <section>
                <h2>逆向工程</h2>
                <p>
                    <code>javap -c 類別名稱 &gt; 追蹤紀錄.txt</code><br>
                    <br>
                    將會在螢幕顯示類別的內部動作方式，並以「追蹤紀錄.txt」文字檔保存起來，以備檢視。
                </p>
            </section>

            <hr>

            <footer>
                <p>
                    [*] 輸入「類別名稱」即可，不需要加上 .class。<br>
                    [*] 如果要將 *.class 還原成 *.java，可以使用 <a href='http://jd.benow.ca' target='_blank'>Java Decompiler</a> 提供的 JD-GUI 反組譯工具。
                </p>
            </footer>

        </article>

    </body>

</html>
