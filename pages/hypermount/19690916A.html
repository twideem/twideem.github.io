<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<title>TWIDEEM CIVS</title>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>
			input{width:470px}
			button{width:60px}
		</style>
		<script src='../../scripts/template.js'></script>
	</head>

	<body>

		<article>

			<header>
				<h1>URL 編碼和解碼</h1>
				<p>
					<input><button>編碼</button><button>解碼</button>
				</p>
			</header>

		</article>

		<script>
			var a=document.getElementsByTagName('input')[0]
			a.focus()
			document.getElementsByTagName('button')[0].addEventListener('click',function(){
				a.value=encodeURI(a.value)
			})
			document.getElementsByTagName('button')[1].addEventListener('click',function(){
				a.value=decodeURI(a.value)
			})
			/*
				escape("http://localhost/page.html#節點?參數=A B C")
				unescape("http%3A//localhost/page.html%23%u7BC0%u9EDE%3F%u53C3%u6578%3DA%20B%20C")

				encodeURI("http://localhost/page.html#節點?參數=A B C")
				decodeURI("http://localhost/page.html#%E7%AF%80%E9%BB%9E?%E5%8F%83%E6%95%B8=A%20B%20C")

				encodeURIComponent("http://localhost/page.html#節點?參數=A B C")
				decodeURIComponent("http%3A%2F%2Flocalhost%2Fpage.html%23%E7%AF%80%E9%BB%9E%3F%E5%8F%83%E6%95%B8%3DA%20B%20C")
			*/
		</script>

	</body>

</html>
