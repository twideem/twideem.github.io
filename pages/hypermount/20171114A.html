<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>Opera 設定集</h1>
            </header>

            <hr>

            <section>
                <h2>首頁鈕</h2>
                <p>
                    <a href='http://addons.opera.com/zh-tw/extensions/details/homepage-in-new-tab/?display=en' target='_blank'>Homepage in New Tab</a>
                </p>
            </section>

            <hr>

            <section>
                <h2>書籤鈕</h2>
                <p>
                    書籤頁面可以鎖定，釘選起來只剩圖示就像按鈕一樣了！
                </p>
            </section>

            <hr>

            <section>
                <h2>開新分頁指向自訂頁面</h2>
                <p>
                    <a href='http://addons.opera.com/zh-tw/extensions/details/custom-new-tab-page/?display=en' target='_blank'>Custom New Tab Page</a>
                </p>
            </section>

            <hr>

            <section>
                <h2>滑鼠手勢</h2>
                <p>
                    沒有延伸套件可用，只能用 Opera 內建不能自訂功能的滑鼠手勢了～
                </p>
            </section>

            <hr>

            <section>
                <h2>阻擋廣告</h2>
                <p>
                    <a href='http://addons.opera.com/zh-tw/extensions/details/adblockforopera/' target='_blank'>AdBlock</a><br>
                    <br>
                    雖然 Opera 內建廣告阻擋，但效果很差。
                </p>
            </section>

            <hr>

            <section>
                <h2>使用 Chrome 的延伸套件</h2>
                <p>
                   先安裝 <a href='http://addons.opera.com/zh-tw/extensions/details/download-chrome-extension-9/' target='_blank'>Install Chrome Extensions</a>，就能使用 <a href='https://chrome.google.com/webstore/category/extensions' target='_blank'>Chrome 線上應用程式商店</a> 裡面的延伸套件了。
                </p>
            </section>

            <hr>

            <section>
                <h2>影片下載</h2>
                <p>
                    <a href='http://www.4kdownload.com' target='_blank'>4K Video Downloader</a>
                </p>
            </section>

        </article>

    </body>

</html>
