	<body>

		<article>

			<header>
				<h1>修改網路連線的名稱</h1>
			</header>

			<hr>

			<p>
				網路連線的名稱重複時，Windows 會自動在字尾加上 2 啊 3 啊的來區別。<br>
				<br>
				覺得難看想改的話：<br>
				<br>
				<var>HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\NetworkList\<br>Profiles\</var><br>
				<br>
				一個個找，在 ProfileName 看到想改的名稱就修改吧～
			</p>

		</article>

	</body>
