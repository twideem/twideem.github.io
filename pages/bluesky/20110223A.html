			<hr>

			<p>
				在 <a href='http://www.microsoft.com/zh-tw/download/details.aspx?id=5842' target='_blank'>http://www.microsoft.com/zh-tw/download/details.aspx?id=5842</a> 可下載離線安裝的 Windows 7 SP1，不過，按「下載」會看到一大堆不曉得在幹嘛的檔案名稱，到底哪個才是 Service Pack 1 離線更新安裝程式？<br>
				<br>
				答案是 64 位元的話，只要下載 <var>windows6.1-KB976932-X64.exe</var> 即可，32 位元則是 <var>windows6.1-KB976932-X86.exe</var>。
