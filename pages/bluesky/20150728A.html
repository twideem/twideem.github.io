        <article>

            <header>
                <h1>讓 Windows 8 開機時自動連線 ADSL</h1>
            </header>

            <hr>

            <p>
                在 Windows 8 的工作排程用 rasphone.exe 連線，並不會自動登入，而是每次都跳出帳號密碼視窗要你按連線，所以改用：<br>
                <br>
                <code>rasdial.exe "連線名稱" "ADSL 帳號" "ADSL 密碼"</code>
            </p>

        </article>
