		<article>

			<header>
				<h1>版本 1803 的控制台沒有變更輸入法了</h1>
			</header>

			<hr>

			<p>
				只能在難用到爆的「設定」，而且拆分成兩部份：<br>
				<br>
				「裝置」→「輸入」→「進階鍵盤設定」（調整快捷鍵在這裡進行）<br>
				<br>
				「時間與語言」→「語言」（新增輸入法在這裡進行）<br>
				<br>
				從 Windows 8 開始，Windows 的輸入法就變得很麻煩、很難用。好不容易找到變通方法，結果又把設定的方法改來改去。誰知道哪天又亂改亂動的，又不曉得怎樣設定輸入法了～
			</p>

		</article>
