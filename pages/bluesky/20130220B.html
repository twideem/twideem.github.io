<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <style>body{background-color:#e8f4ff}</style>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>在雙顯筆電中，強制使用獨立顯示卡，不要自動切換。</h1>
            </header>

            <hr>

            <section>
                <h2>Windows 8</h2>
                <p>
                    「螢幕右角」→「設定」→「控制台」→「硬體和音效」→「NVIDIA 控制面板」→「管理 3D 設定」→「廣域設定」→「慣用的圖形處理器」→「高效能 NVIDIA 處理器」<br>
                    <br>
                    然而，雙顯筆電的好處，就是省電長效，所以不建議這樣做。應該把「廣域設定」的部分，改為在「程式設定」中，一一挑選列出的遊戲軟體，個別將慣用的圖形處理器指定為獨立顯示卡即可。
                </p>
            </section>

            <hr>

            <footer>
                <p>[*] 本文是在 Core i5 架構下的 Intel HD 4000 與 nVidia G635M 雙顯卡。</p>
            </footer>

        </article>

    </body>

</html>
