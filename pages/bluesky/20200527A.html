	<body>

		<article>

			<header>
				<h1>可不可以不要再為每個檔案勾選「解除封鎖」 (#`Д´)ﾉ</h1>
			</header>

			<hr>

			<p>
				網路來的檔案，得一個個用滑鼠開啟右鍵選單按「內容」→「一般」→「解除封鎖」，不能批次處理，實在有夠折騰人！<br>
				<br>
				像我經常會從網頁瀏覽器拉一堆 URL 檔案，一個個解除封鎖心情會變成很糟！<br>
				<br>
				所以我乾脆取消這功能算了：<br>
				<br>
				<code>
					[HKEY_CURRENT_USER\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Attachments]<br>
					"SaveZoneInformation"=dword:00000001
				</code>
			</p>

			<hr>

			<footer>
				<p>
					[*] 一個個檔案被封鎖，跟電腦中了病毒導致使用不便有什麼兩樣？
				</p>
			</footer>

		</article>

	</body>

</html>
