		<article>

			<header>
				<h1>關閉 Windows 8 自動維護</h1>
			</header>

			<hr>

			<p>
				算是重要訊息中心比較煩人的訊息。如果維護得完就算了，但怎麼過老久了它還沒維護完？總讓人覺得關掉算了：<br>
				<br>
				「螢幕右角」→「控制台」→「系統及安全性」→「排程工作」→依序展開「工作排程器程式庫\Microsoft\Windows\TaskScheduler」→停用「Idle Maintenance」「Regular Maintenance」
			</p>

			<hr>

			<footer>
				<p>
					[*] 雖然 Windows Vista 與 Windows 7 也有，但感覺 Windows 8 的自動維護比較常出現，而且沒完沒了。
				</p>
			</footer>

		</article>

	</body>
