<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>body{background-color:#e8f4ff}</style>
		<script src='../../scripts/template.js'></script>
	</head>

	<body>

		<article>

			<header>
				<h1>Aegisub 設定集</h1>
			</header>

			<hr>

			<section>
				<h2>關閉拼字檢查</h2>
				<p>
					「View」→「Option」→「Interface」→取消「Enable syntax highlighting」的勾選
				</p>
			</section>

			<hr>

			<section>
				<h2>自動掛載連結影音</h2>
				<p>
					「View」→「Option」→「General」→將「Automatically load linked files」設為「Always」
				</p>
			</section>

			<hr>

			<section>
				<h2>音訊改用聲波</h2>
				<p>
					「Audio」→「Waveform Display」
				</p>
			</section>

			<hr>

			<section>
				<h2>換行</h2>
				<p>
					\N<br>
					<br>
					注意要大寫！
				</p>
			</section>

		</article>

	</body>

</html>
