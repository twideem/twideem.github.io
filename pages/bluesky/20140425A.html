    <body>

        <article>

            <header>
                <h1>清除通知區域裡無效的舊圖示</h1>
            </header>

            <hr>

            <p>
                用 regedit.exe 到：<br>
                <br>
                <var>HKEY_CURRENT_USER\Software\Classes\Local Settings\Software\Microsoft\Windows\CurrentVersion\TrayNotify</var><br>
                <br>
                刪除 <var>IconStreams</var> 與 <var>PastIconsStream</var>，然後結束 explorer.exe 並重新執行。
            </p>

        </article>

    </body>
