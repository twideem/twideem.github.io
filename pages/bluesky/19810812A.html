<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <style>body{background-color:#e8f4ff}</style>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>DOS 指令</h1>
            </header>

            <hr>

            <section>
                <h2>基本指令</h2>
                <table>
                    <tr><td>DIR</td><td>顯示目錄中的檔案和子目錄清單。</td></tr>
                    <tr><td>COPY</td><td>將檔案複製到另一個位置。</td></tr>
                    <tr><td>REN</td><td>重新命名檔案。</td></tr>
                    <tr><td>CD</td><td>顯示或變更目前目錄的名稱。</td></tr>
                    <tr><td>MD</td><td>建立目錄。</td></tr>
                    <tr><td>RD</td><td>移除目錄。</td></tr>
                    <tr><td>DEL</td><td>刪除檔案。</td></tr>
                    <tr><td>TYPE</td><td>顯示文字檔的內容。</td></tr>
                    <tr><td>SET</td><td>顯示、設定或移除環境變數。</td></tr>
                    <tr><td>PATH</td><td>顯示或設定可執行檔的搜尋路徑。</td></tr>
                    <tr><td>HELP</td><td>為命令提供說明資訊。</td></tr>
                    <tr><td>VER</td><td>顯示版本。</td></tr>
                    <tr><td>CLS</td><td>清除螢幕。</td></tr>
                </table>
            </section>

            <hr>

            <section>
                <h2>實用指令</h2>
                <table>
                    <tr><td>TIMEOUT 秒數</td><td>等候指定的時間長度。</td></tr>
                    <tr><td>FIND "字串" 檔案</td><td>搜尋一或多個檔案中的文字字串。</td></tr>
                </table>
            </section>

        </article>

    </body>

</html>
