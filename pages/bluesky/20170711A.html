<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>body{background-color:#e8f4ff}</style>
		<script src='../../scripts/template.js'></script>
	</head>

	<body>

		<article>

			<header>
				<h1>用鍵盤移動滑鼠</h1>
			</header>

			<hr>

			<section>
				<h2>啟動滑鼠鍵</h2>
				<p>
					按 <kbd>Alt+Shift+Num Lock</kbd> 可啟動滑鼠鍵，用鍵盤操作滑鼠。
				</p>
			</section>

			<hr>

			<section>
				<h2>移動滑鼠游標</h2>
				<p>
					Num pad 的方向鍵用來移動滑鼠游標，可用 <kbd>Num 1</kbd>、<kbd>Num 3</kbd>、<kbd>Num 7</kbd>、<kbd>Num 9</kbd> 斜著移動。<br>
					<br>
					按 <kbd>Ctrl</kbd> 可以增加游標移動距離，<kbd>Shift</kbd> 則是減少游標移動距離。
				</p>
			</section>

			<hr>

			<section>
				<h2>滑鼠左鍵、滑鼠右鍵</h2>
				<p>
					用 <kbd>Num /</kbd> 切換滑鼠左鍵，<kbd>Num *</kbd> 切換滑鼠左右鍵（不是中鍵），<kbd>Num -</kbd> 切換滑鼠右鍵，再用 <kbd>Num 5</kbd> 單擊切換的鍵，或按 <kbd>Num+</kbd> 雙擊切換的鍵。
				</p>
			</section>

			<hr>

			<section>
				<h2>拖曳</h2>
				<p>
					<kbd>Num 0</kbd> 用來 Drag，<kbd>Num .</kbd> 用來 Drop。
				</p>
			</section>

		</article>

	</body>

</html>
