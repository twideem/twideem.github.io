        <article>

            <header>
                <h1>啟用 Administrator 系統管理員帳戶</h1>
            </header>

            <hr>

            <p>
                以系統管理員身分執行「命令提示字元」，然後輸入：<br>
                <br>
                <code>net user administrator /active:yes</code><br>
                <br>
                即可登出使用者帳戶後，選擇名稱為 Administrator 的帳戶來登入。
            </p>

        </article>
