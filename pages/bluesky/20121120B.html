<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<title>TWIDEEM CIVS</title>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>body{background-color:#e8f4ff}</style>

	<body>

		<article>

			<header>
				<h1>動態調整分割磁碟的容量</h1>
				<p>
					Windows Vista 開始，內建動態調整磁碟容量的功能，可以在不搬動檔案的情況下，調整各磁碟分割槽的容量大小。
				</p>
			</header>

			<hr>

			<section>
				<h2>使用前注意事項</h2>
				<p>
					<strong>操作過程，極可能導致重要檔案遺失，無法自行承擔風險者，請勿進行如下步驟。</strong>
				</p>
			</section>

			<hr>

			<section>
				<h2>Windows 8</h2>
				<p>
					「螢幕右角」→「設定」→「控制台」→「系統及安全性」→「建立及格式化硬碟磁碟分割」→先把覺得容量較多的磁碟槽「壓縮」，再把多出來的空間配給其它磁碟槽。
				</p>
			</section>

		</article>

	</body>

</html>
