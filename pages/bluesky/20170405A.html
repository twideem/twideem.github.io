    <body>

        <article>

            <header>
                <h1>如何讓微軟注音的候選詞排在上面</h1>
            </header>

            <hr>

            <p>
                必須圈選「候選字順序依使用頻率調整」，候選詞才會排在上面，否則會排在最後面。<br>
                <br>
                像ㄧˋㄨㄟˋ的候選字長達十七頁，如果你不知道按↑直接跳到最後頁，而是按↓一頁頁去翻，真的會氣死。重點是誰知道他會長達十七頁？真的有可能按↓一頁頁翻，因為選字時按↓按順手了，忽然按↑總覺得「切換」不過來。<br>
                <br>
                然而，「候選字順序依使用頻率調整」必須勾選「啟用個人化調整」才能圈選，如果受不了微軟注音智障選字怎麼辦？<br>
                <br>
                很簡單，圈選完「候選字順序依使用頻率調整」再取消勾選即可「啟用個人化調整」！<br>
                <br>
                <samp>勾選「啟用個人化調整」→圈選「候選字順序依使用頻率調整」→取消勾選「啟用個人化調整」。</samp>
            </p>

        </article>

    </body>

</html>
