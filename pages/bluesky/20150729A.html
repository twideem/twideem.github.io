<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>body{background-color:#e8f4ff}</style>
		<script src='../../scripts/template.js'></script>
	</head>

	<body>

		<article>

			<header>
				<h1>從睡眠喚醒電腦時直接進入桌面而不是登入畫面</h1>
			</header>

			<hr>

			<p>
				「開始」→「設定」→「帳戶」→「登入選項」→「Windows 應該在您離開多久之後要求您再次登入」（帳戶必須設定密碼才看得到這選項）→「永不」（設定後再把設定密碼為空即可解除密碼）
			</p>

			<hr>

			<footer>
				<p>
					[睡眠] 啟動更快，適合當日會繼續使用電腦。<br>
					[休眠] 耗電更少，適合好幾天不使用電腦。
				</p>
			</footer>

		</article>

	</body>

</html>
