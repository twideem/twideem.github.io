	<body>

		<article>

			<header>
				<h1>某軟體忽然沒聲音</h1>
			</header>

			<hr>

			<p>
				所有軟體都很正常，偏偏只有某個軟體沒聲音，那問題可能出在 Windows 10 的 Xbox 遊戲列！這玩意兒可以調整每個影音軟體的影像與聲音，有可能我們的某個軟體被它動手腳了～<br>
				<br>
				首先開啟出問題的應用軟體，並且重現沒有聲音的情況。不能只是進入軟體而已，要讓軟體明明有播放音效，只是我們聽不到。<br>
				<br>
				然後按 <kbd>WIN+G</kbd> 鍵啟動 Xbox 遊戲列，查一下「音訊」的部分，看軟體的音效是不是被關掉了：
			</p>
			<figure>
				<img src='../../figures/bluesky/20191219A.png' alt='插圖'>
				<figcaption>像我是 Vivaldi 瀏覽器忽然沒聲音，沒辦法在 YouTube 好好看片。</figcaption>
			</figure>
			<p>
				開啟後就恢復正常了。<br>
				<br>
				大概不曉得按了什麼快捷鍵，不小心啟動 Xbox 遊戲列的關閉音效功能吧？怎麼按法我就不知道了。
			</p>

		</article>

	</body>

</html>
