	<head>
		<meta charset='UTF-8'>

		<style>body{background-color:#e8f4ff}</style>

	<body>

		<article>

			<header>
				<h1>版本 2004 無法切換內顯和獨顯</h1>
			</header>

			<hr>

			<p>
				在以往，要對遊戲或軟體手動設定使用「內建顯示晶片」還是「外接顯示卡」，是透過外接顯示卡安裝的軟體來進行，例如「NVIDIA 控制面板」或「Radeon 設定」。<br>
				<br>
				從 20H1 開始，這些設定被無視了！由 Windows 10 依據自己內部的設定進行，所以必須改用 Windows 10 提供的設定方式：<br>
				<br>
				<kbd>設定 → 系統 → 顯示器 → 圖形設定 → 瀏覽  →（選擇想要設定的程式）→ 選項 → 省電 或 高效能</kbd><br>
				<br>
				「省電」就是內建顯示晶片，「高效能」就是外接顯示卡。
			</p>

		</article>

	</body>

</html>
