<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>

        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <style>body{background-color:#e8f4ff}</style>

    <body>

        <article>

            <header>
                <h1>刪除「正在使用中」的資料夾或檔案</h1>
                <p>Windows Vista 系列的作業系統，比 Windows XP 更容易發生資料夾與檔案「正在使用中」的情形。要命的是，根本不告訴你究竟是被哪一個程式使用的！</p>
            </header>

            <hr>

            <section>
                <h2>用 Windows 8 內建的工具找出罪魁禍首</h2>
                <p>
                    其實跟 Windows XP 一樣，用監測系統性能的「工作管理員」就可以追蹤了。
                </p>
                <hr>
                <section>
                    <h3>步驟一</h3>
                    <p>
                        開啟「工作管理員」→「效能」→「開啟資源監視器」。
                    </p>
                </section>
                <hr>
                <section>
                    <h3>步驟二</h3>
                    <p>
                        切換到「CPU」頁籤 → 在「關聯控制代碼」輸入被使用的資料夾。
                    </p>
                </section>
                <hr>
                <section>
                    <h3>步驟三</h3>
                    <p>
                        這樣就搜尋出使用這個資料夾的程式……不過，接下來就要靠自己經驗，判斷該關哪些程式不會當機～
                    </p>
                </section>
            </section>

        </article>

    </body>

</html>
