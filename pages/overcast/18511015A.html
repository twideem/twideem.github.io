        <article>

            <header>
                <h1>氣象用詞</h1>
            </header>

            <hr>

            <p>
                晴：雲量佔天空四成以下。佔預報時間七成五以上為晴天、一半以上為晴時多雲。<br>
                多雲：雲量佔天空一半以上。佔預報時間不到七成五為多雲時晴或多雲時陰。<br>
                陰：雲量佔天空九成以上。佔預報時間七成五以上為陰天、一半以上為陰時多雲。<br>
                <br>
                雨：連續或間歇性降雨，強度均勻緩和。<br>
                陣雨：忽強忽弱、時而停止之降雨<br>
                雷陣雨：伴有雷電之陣雨。<br>
                短暫：下雨佔預報時間兩成五以下，沒有的話不用。<br>
                <br>
                範例：陰短暫陣雨。
            </p>

            <hr>
