    <body>

        <article>

            <header>
                <h1>蛋的知識</h1>
            </header>

            <hr>

            <p>
                蛋殼薄，表示雞身體不好。除了身體衰老，營養成分較差，也有可能是身體生病，有極低機率蛋裡染有病毒，可關注一下新聞最近有沒有什麼雞的疫情再吃。但絕大多數來講，買到殼太薄的蛋還是可以正常食用的，真不放心的話可以打電話給廠商，問能不能換一盒。<br>
                <br>
                用水洗過會失去保護膜，必須近日內用完，放一星期就會壞掉。<br>
                <br>
                鈍端是氣室要朝上，否則蛋黃離開正位往下沉，會提早變成不新鮮的蛋。<br>
                <br>
                搖起來像水不新鮮，雖然還沒壞，但請勿買來保存，必須在三天內吃完。<br>
                <br>
                看到蛋黃是散開的，已變質，不建議食用。<br>
                <br>
                原本全白色的蛋，放一個月後，蛋殼散落淡灰色圓塊，表示發霉、長菌，請勿食用。（蛋的保存期限本來就差不多一個月）
            </p>

        </article>
