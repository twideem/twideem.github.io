<!DOCTYPE html>

<html lang='zh-TW'>

	<head>
		<meta charset='UTF-8'>
		<link href='../../favicon.png' rel='icon'>
		<link href='../../styles/layout.css' rel='stylesheet'>
		<style>input{width:565px}</style>
		<script src='../../scripts/template.js'></script>
	</head>

	<body>

		<article>

			<header>
				<h1>九宮格數字轉方向箭頭</h1>
				<p>為了方便整理格鬥類遊戲攻略所設計的輔助工具。</p>
			</header>

			<hr>

			<section>
				<h2>輸入</h2>
				<p>
					<textarea cols='78' rows='1'></textarea>
				</p>
			</section>

			<hr>

			<section>
				<h2>用法</h2>
				<p>
					請用九宮格當搖桿輸入數字，或直接將整串文字複製貼上。
				</p>
			</section>

		</article>

		<script>
			var a=document.getElementsByTagName('textarea')[0]
			a.focus()
			a.addEventListener('keyup',function(x){
				a.value=a.value.replace(/(1)/ig,'↙')
				a.value=a.value.replace(/(2)/ig,'↓')
				a.value=a.value.replace(/(3)/ig,'↘')
				a.value=a.value.replace(/(4)/ig,'←')
				a.value=a.value.replace(/(6)/ig,'→')
				a.value=a.value.replace(/(7)/ig,'↖')
				a.value=a.value.replace(/(8)/ig,'↑')
				a.value=a.value.replace(/(9)/ig,'↗')
			})
		</script>

	</body>

</html>
