	<body>

		<article>

			<section>

					<button onclick='f(4)'>週四</button>
					<button onclick='f(5)'>週五</button>
					<button onclick='f(6)'>週六</button>
					<button onclick='f(0)'>週日</button>
					<button onclick='f(7)'>明天</button>

			</section>

		</article>

		<script>
			var a=[
				['星期日','../../objects/audio/-01390208A_07.mp3','Nokia 經典鈴聲再現賽事裡，個人針對週日心情挑選的鈴聲。','5853','Connecting People','Mcolom','13256'],
				['星期一','../../objects/audio/-01390208A_01.mp3','Nokia 經典鈴聲再現賽事裡，個人針對週一心情挑選的鈴聲。','5449','Brit Nokia','Pablo_Gomez','14766'],

				['星期三','../../objects/audio/-01390208A_03.mp3','Nokia 經典鈴聲再現賽事裡，個人針對週三心情挑選的鈴聲。','584','Nokia Forever','jefemusic','5047'],

			function f(x){
