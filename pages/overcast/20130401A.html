<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>標題未定</h1>
                <p>（草稿中）</p>
            </header>

            <hr>

            <section>
                <h2>標題未定</h2>
                <p>（草稿中）</p>
            </section>

            <hr>

            <section>
                <h2>變更內容</h2>
                <p>
                    <button onclick='chapter.innerHTML=prompt("請輸入內容：")'>主題</button>
                    <button onclick='abstract.innerHTML=prompt("請輸入內容：")'>概要</button>
                    <button onclick='article.innerHTML=prompt("請輸入內容：")'>標題</button>
                    <button onclick='paragraph.innerHTML=prompt("請輸入內容：")'>內文</button>
                    <button onclick='footnote.innerHTML=prompt("請輸入內容：")'>註腳</button>
                </p>
            </section>

            <hr>

            <footer>
                <p>[*] 本文摘錄自維基百科的文獻。</p>
            </footer>

        </article>

        <script>
            //_metadata = 夾帶的資訊，像是：書名、作者、出版商、ISBN … 等。
            var chapter = document.querySelectorAll('header h1')[0];
            var abstract = document.querySelectorAll('header p')[0];
            var article = document.querySelectorAll('section h2')[0];
            var paragraph = document.querySelectorAll('section p')[0];
            var footnote = document.querySelectorAll('footer p')[0];
            chapter.innerHTML = 'April Fool!';
            abstract.innerHTML = '在歐美一些國家，陽曆４月１日是愚人節（幽默節），這一天，人們以多種方式開周圍的人的玩笑，上當者當被告知是愚人節時，才恍然大悟，所以這一天總是能夠引出許多笑話，不過某些玩笑也會因開得過大而引起人們的恐慌，或改變形勢衍生成為（網路）謠言與都會傳奇。';
            article.innerHTML = '各國名稱';
            paragraph.innerHTML = "英文：April Fools' Day<br>中文：愚人節<br>日文：エイプリルフール";
        </script>

    </body>

</html>
