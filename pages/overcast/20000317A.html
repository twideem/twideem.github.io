<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>每秒鐘消耗熱量</h1>
            </header>

            <hr>

            <p>
                一天 24 小時 = 86400 秒<br>
                <br>
                一天消耗 2000 大卡的話：<br>
                <br>
                <samp>
                    每秒鐘消耗 0.0231481481481 大卡。<br>
                    每分鐘消耗 1.3888888888 大卡。<br>
                </samp>
                <br>
                某動作一整天消耗 100 大卡的話：<br>
                <br>
                <samp>
                    每秒鐘消耗 0.00115740740740 大卡。<br>
                    每分鐘消耗 0.069444444444 大卡。<br>
                </samp>
                <br>
                那專程按滑鼠點到無聊內容白白消耗掉熱量的梗，數據是：<br>
                <br>
                <samp>
                    每秒鐘消耗 0.02431 大卡。<br>
                    30 秒消耗 0.72915 大卡。<br>
                    一分鐘消耗 1.45833 大卡。<br>
                </samp>
                <br>
                例句：「Ｘ！真他Ｘ的無聊，害我專程消耗 0.02431 大卡的熱量點進來看！」
            </p>

        </article>

    </body>

</html>
