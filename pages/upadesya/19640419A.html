	<body>

		<article>

			<header>
				<h1>圓覺宗心要偈</h1>
			</header>

			<hr>

			<p>
				念念返聞本寂體，隨遇而安不分別；<br>
				觸目逢緣皆妙用，幻顯幻滅離取捨；<br>
				豎窮三際遍十方，心光圓照寂滅相；<br>
				本寂本照本不動，無修無證無證者；<br>
				三身五智原具足，普賢佛位任運成；<br>
				上與諸佛同慈力，下與有情共悲仰；<br>
				三密如幻救度海，無餘悉歸常寂光；<br>
				無盡法界願示現，無住度生大圓覺。
			</p>

		</article>

	</body>

</html>
