			<header>
				<h1>佛性</h1>
			</header>

			<hr>

			<p>
				也叫覺性、自性、真如、實相、如來藏、圓覺等。<br>
				<br>
				佛性一詞在不同的情況下可有不同的內涵。《涅槃經》說「佛性有種種名，於一佛性，亦名法性、涅槃，亦名般若、一乘，亦名首楞嚴三昧、獅子吼三昧。」大乘佛教的一些經典認為一切眾生皆有佛性，一切眾生都有覺悟成佛的可能性。但眾生因迷妄的深淺，而有賢愚、明昧的不同。<br>
				<br>
				在早期結集的佛教經典中並無相關記載，此為公元一世紀後，後般若經時期及唯識初期所出現之用詞，已經引入印度奧義書和其他教派思想的觀念，為大乘佛教「有宗」的核心思想，並非全部佛教教派皆認可之觀念。
			</p>
