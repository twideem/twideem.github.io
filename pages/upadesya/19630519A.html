<!DOCTYPE html>

<html lang='zh-TW'>

    <head>
        <meta charset='UTF-8'>
        <title>TWIDEEM CIVS</title>
        <link href='../../favicon.png' rel='icon'>
        <link href='../../styles/layout.css' rel='stylesheet'>
        <script src='../../scripts/template.js'></script>
    </head>

    <body>

        <article>

            <header>
                <h1>三法印</h1>
                <p>
                    諸行無常、諸法無我、涅槃寂靜。<br>
                    <br>
                    符合此三原則，便是佛正法，如世間印信，故名法印。
                </p>
            </header>

            <hr>

            <section>
                <h2>諸行無常</h2>
                <p>
                    諸行無常是說一切世間法無時不在生住異滅中，過去有的，現在起了變異，現在有的，將來終歸幻滅。
                </p>
            </section>

            <hr>

            <section>
                <h2>諸法無我</h2>
                <p>
                    諸法無我是說在一切有為無為的諸法中，無有我的實體；所謂我的存在只是相對的生理和心理幻象。
                </p>
            </section>

            <hr>

            <section>
                <h2>涅槃寂靜</h2>
                <p>
                    涅槃寂靜是說涅槃的境界，滅除一切生死的痛苦，無為安樂，故涅槃是寂靜的。
                </p>
            </section>

            <hr>

            <footer>
                <p>
                    [*] 本文摘錄自 Wikipedia 的文獻。
                </p>
            </footer>

        </article>

    </body>

</html>
