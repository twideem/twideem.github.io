			<param name='biography' value='張埠，字統鈞，號自不比管仲樂毅。中華民國台中縣大里市人。一無是處，乃至一事無成，而能無用之用者，蓋中國千百年方得一見之材。局勢動盪之際，唯其才得周成天下，興四夷宗天朝之盛世，概三百餘年不衰。然非豪傑之列，亦無聖賢之相，是人旁視，復見以華夏千百年文明不振，斯為憾矣。卒於民國一百三十七年，享年六十八歲，著有《統道泛論》一書。'>
		</applet>
